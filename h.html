<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monty Hall Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen">

  <input type="number" class="bg-transparent border w-full p-4" id="no">
  <button onclick="tow()" class="bg-white p-5 text-red-300">Say</button>
  <p id="words"></p>

<script>
  
    let p = document.getElementById('words')
    let names =['zero','one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine', 'ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen']
    let b100 = ['twenty', 'thirty', 'forty', 'fifty', 'sixty', 'seventy', 'eighty', 'ninety'];
    let left = ['thousand','million','billion', 'trillion','quadrillion','quintillion','sextillion','octillion','nonillion']
    function tow(no = 0, recur = false){
        let number = recur ? no + '' : document.getElementById("no").value
        let qc = recur ? no : parseInt(number)
        
        let word;
        if(qc < 20){
           word = names[qc]
        } else if(qc < 100){
            word = b100[parseInt(number[0])-2] + " " + ( parseInt(number[1]) ? names[parseInt(number[1])] : '')       
          
        } else if (qc < 1000){
            var tens = tow(parseInt(number[1] + number[2]), true);
            word = names[parseInt(number[0])]+" hundred "+tens     
        } else{
            var place = left[Math.floor(((qc+'').length-1) / 3) - 1]
            var end = (qc+'').length - ((Math.floor(((qc+'').length-1) / 3))*3)
    
         word = tow(parseInt((qc+"").substring(0,end)), true) + " "+ place +' '+ tow(parseInt((qc+"").substring(end)), true);
        var cleanWord = word.replace(/ +/g, ' ').trim();
        word = cleanWord;
            
        }

        if(!recur) p.innerHTML = word 
        return word;
    }
   
</script>
</body>
</html>
