<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up – Amanda Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script src="js/supabase.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["DM Sans", "sans-serif"],
              display: ["Sora", "sans-serif"],
            },
            colors: {
              navy: { DEFAULT: "#1B2B4B", light: "#243560" },
              gold: { DEFAULT: "#C9A84C", light: "#E8C96D" },
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "DM Sans", sans-serif;
      }
      .font-display {
        font-family: "Sora", sans-serif;
      }
      .gold-gradient {
        background: linear-gradient(135deg, #c9a84c, #e8c96d);
      }
      .auth-bg {
        background: linear-gradient(135deg, #1b2b4b 0%, #243560 100%);
      }
      .glass-input {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #fff;
        transition: all 0.2s;
        width: 100%;
        padding: 11px 14px;
        border-radius: 12px;
        font-size: 14px;
        font-family: "DM Sans", sans-serif;
        outline: none;
        box-sizing: border-box;
      }
      .glass-input:focus {
        border-color: rgba(201, 168, 76, 0.5);
        background: rgba(255, 255, 255, 0.08);
      }
      .glass-input::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.08);
      }
      input:-webkit-autofill {
        -webkit-box-shadow: 0 0 0 30px #1e3561 inset !important;
        -webkit-text-fill-color: #fff !important;
      }
    </style>
  </head>
  <body
    class="auth-bg min-h-screen flex items-center justify-center px-4 py-12"
  >
    <div class="w-full max-w-sm">
      <div class="text-center mb-8">
        <a href="index.html" class="inline-flex items-center gap-2 mb-6">
          <div
            class="w-9 h-9 gold-gradient rounded-xl flex items-center justify-center"
          >
            <i class="fas fa-id-card text-white text-sm"></i>
          </div>
          <span class="font-display font-bold text-xl text-white"
            >Amanda<span class="text-gold">Cards</span></span
          >
        </a>
        <h1 class="font-display text-2xl font-bold text-white mb-1">
          Create your account
        </h1>
        <p class="text-blue-200/50 text-sm">
          Get your digital business card today
        </p>
      </div>

      <div
        class="bg-white/5 border border-white/10 rounded-3xl p-7 backdrop-blur-sm"
      >
        <form id="signupForm" onsubmit="handleSignup(event)" class="space-y-4">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-blue-200/60 font-medium mb-1.5"
                >First Name</label
              >
              <input
                type="text"
                id="firstName"
                placeholder="Jane"
                class="glass-input"
                required
              />
            </div>
            <div>
              <label class="block text-xs text-blue-200/60 font-medium mb-1.5"
                >Last Name</label
              >
              <input
                type="text"
                id="lastName"
                placeholder="Nakato"
                class="glass-input"
                required
              />
            </div>
          </div>
          <div>
            <label class="block text-xs text-blue-200/60 font-medium mb-1.5"
              >Email address</label
            >
            <input
              type="email"
              id="email"
              placeholder="you@example.com"
              class="glass-input"
              required
            />
          </div>
          <div>
            <label class="block text-xs text-blue-200/60 font-medium mb-1.5"
              >Referral / Promo Code (optional)</label
            >
            <input
              type="text"
              id="promoCode"
              placeholder="Enter promo code"
              class="glass-input"
            />
          </div>
          <div>
            <label class="block text-xs text-blue-200/60 font-medium mb-1.5"
              >Password</label
            >
            <div class="relative">
              <input
                type="password"
                id="password"
                placeholder="Min. 8 characters"
                class="glass-input pr-10"
                required
                minlength="8"
              />
              <button
                type="button"
                onclick="togglePwd('password', 'eye1')"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 transition"
              >
                <i id="eye1" class="fas fa-eye text-xs"></i>
              </button>
            </div>
          </div>
          <div>
            <label class="block text-xs text-blue-200/60 font-medium mb-1.5"
              >Confirm Password</label
            >
            <div class="relative">
              <input
                type="password"
                id="confirmPwd"
                placeholder="Repeat password"
                class="glass-input pr-10"
                required
              />
              <button
                type="button"
                onclick="togglePwd('confirmPwd', 'eye2')"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 transition"
              >
                <i id="eye2" class="fas fa-eye text-xs"></i>
              </button>
            </div>
          </div>
          <label class="flex items-start gap-2 cursor-pointer">
            <input
              type="checkbox"
              id="terms"
              class="mt-0.5 accent-gold"
              required
            />
            <span class="text-xs text-blue-200/50"
              >I agree to the
              <a href="#" class="text-gold hover:underline">Terms of Service</a>
              and
              <a href="#" class="text-gold hover:underline"
                >Privacy Policy</a
              ></span
            >
          </label>
          <div
            id="signupError"
            class="hidden text-xs text-red-400 bg-red-400/10 border border-red-400/20 rounded-lg px-3 py-2"
          ></div>
          <button
            type="submit"
            id="signupBtn"
            class="w-full gold-gradient text-navy font-bold py-3.5 rounded-xl text-sm hover:opacity-90 transition mt-1"
          >
            Create Account
          </button>
        </form>
      </div>

      <p class="text-center text-sm text-blue-200/40 mt-6">
        Already have an account?
        <a
          href="login.html"
          class="text-gold hover:text-gold-light transition font-medium"
          >Sign in</a
        >
      </p>
    </div>

    <script>
      function togglePwd(id, iconId) {
        const inp = document.getElementById(id),
          icon = document.getElementById(iconId);
        inp.type = inp.type === "password" ? "text" : "password";
        icon.classList.toggle("fa-eye");
        icon.classList.toggle("fa-eye-slash");
      }

      function prefillPromoCode() {
        const params = new URLSearchParams(window.location.search);
        const promo = params.get("promo")?.trim();
        if (promo) document.getElementById("promoCode").value = promo;
      }

      prefillPromoCode();

      async function handleSignup(e) {
        e.preventDefault();
        const btn = document.getElementById("signupBtn");
        const firstName = document.getElementById("firstName").value.trim();
        const lastName = document.getElementById("lastName").value.trim();
        const email = document.getElementById("email").value.trim();
        const promoCode = document
          .getElementById("promoCode")
          .value.trim()
          .toLowerCase();
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirmPwd").value;
        const errEl = document.getElementById("signupError");
        errEl.classList.add("hidden");

        if (password !== confirm) {
          errEl.textContent = "Passwords do not match.";
          errEl.classList.remove("hidden");
          return;
        }

        let referrerId = null;
        if (promoCode) {
          try {
            const matches = await dbSelect(
              "profiles",
              `?slug=eq.${encodeURIComponent(promoCode)}&select=id,slug`,
            );
            if (!matches || matches.length === 0) {
              errEl.textContent = "Invalid promo code.";
              errEl.classList.remove("hidden");
              return;
            }
            referrerId = matches[0].id;
          } catch (err) {
            errEl.textContent = "Unable to validate promo code.";
            errEl.classList.remove("hidden");
            return;
          }
        }

        setLoading(btn, true);
        try {
          const data = await signUpEmail(email, password, {
            first_name: firstName,
            last_name: lastName,
          });

          if (data.access_token) {
            // Create profile row
            const userSlug =
              `${firstName}-${lastName}-${data.user.id.slice(0, 6)}`
                .toLowerCase()
                .trim()
                .replace(/[^a-z0-9]+/g, "-")
                .replace(/^-|-$/g, "");
            console.log("Generated user slug:", userSlug);
            await dbInsert(
              "profiles",
              {
                id: data.user.id,
                first_name: firstName,
                last_name: lastName,
                email: email,
                slug: userSlug,
                referred_by: referrerId || null,
                promo_code: promoCode || null,
              },
              true,
            );

            window.location.href = "dashboard.html";
          } else {
            errEl.textContent =
              "Please check your email to confirm your account before logging in.";
            errEl.classList.remove("hidden");
            errEl.style.color = "#86efac";
            errEl.style.background = "rgba(134,239,172,0.1)";
            errEl.style.borderColor = "rgba(134,239,172,0.2)";
          }
        } catch (err) {
          errEl.textContent =
            err.message || "Sign up failed. Please try again.";
          errEl.classList.remove("hidden");
          setLoading(btn, false, "Create Account");
        }
      }
    </script>
  </body>
</html>
