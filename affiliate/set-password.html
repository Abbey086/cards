<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set Password – Amanda Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script src="js/supabase.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["DM Sans", "sans-serif"],
              display: ["Sora", "sans-serif"],
            },
            colors: {
              navy: { DEFAULT: "#1B2B4B", light: "#243560" },
              gold: { DEFAULT: "#C9A84C", light: "#E8C96D" },
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "DM Sans", sans-serif;
        background: linear-gradient(135deg, #1b2b4b 0%, #243560 100%);
      }
      .font-display {
        font-family: "Sora", sans-serif;
      }
      .gold-gradient {
        background: linear-gradient(135deg, #c9a84c, #e8c96d);
      }
      .glass-input {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #fff;
        transition: all 0.2s;
        width: 100%;
        padding: 11px 14px;
        border-radius: 12px;
        font-size: 14px;
        font-family: "DM Sans", sans-serif;
        outline: none;
      }
      .glass-input:focus {
        border-color: rgba(201, 168, 76, 0.5);
        background: rgba(255, 255, 255, 0.08);
      }
      .glass-input::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">
      <div class="text-center mb-8">
        <a href="index.html" class="inline-flex items-center gap-2 mb-6">
          <div
            class="w-8 h-8 gold-gradient rounded-xl flex items-center justify-center"
          >
            <i class="fas fa-id-card text-white text-sm"></i>
          </div>
          <span class="font-display font-bold text-xl text-white"
            >Amanda<span class="text-gold">Cards</span></span
          >
        </a>
        <h1 class="font-display text-2xl font-bold text-white mb-1">
          Set Your Password
        </h1>
        <p class="text-blue-200/50 text-sm">
          Welcome! Please set a secure password for your affiliate account.
        </p>
      </div>

      <div
        class="bg-white/5 border border-white/10 rounded-3xl p-7 backdrop-blur-sm"
      >
        <form onsubmit="handleSetPassword(event)" class="space-y-4">
          <div>
            <label class="block text-xs text-blue-200/60 font-medium mb-1.5"
              >New Password</label
            >
            <div class="relative">
              <input
                type="password"
                id="password"
                placeholder="Min. 8 characters"
                class="glass-input pr-10"
                required
                minlength="8"
              />
              <button
                type="button"
                onclick="togglePwd('password', 'eye1')"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 transition"
              >
                <i id="eye1" class="fas fa-eye text-xs"></i>
              </button>
            </div>
          </div>
          <div>
            <label class="block text-xs text-blue-200/60 font-medium mb-1.5"
              >Confirm Password</label
            >
            <div class="relative">
              <input
                type="password"
                id="confirmPwd"
                placeholder="Repeat password"
                class="glass-input pr-10"
                required
              />
              <button
                type="button"
                onclick="togglePwd('confirmPwd', 'eye2')"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 transition"
              >
                <i id="eye2" class="fas fa-eye text-xs"></i>
              </button>
            </div>
          </div>
          <div
            id="error"
            class="hidden text-xs text-red-400 bg-red-400/10 border border-red-400/20 rounded-lg px-3 py-2"
          ></div>
          <button
            type="submit"
            id="setPasswordBtn"
            class="w-full gold-gradient text-navy font-bold py-3.5 rounded-xl text-sm hover:opacity-90 transition mt-1"
          >
            Set Password
          </button>
        </form>
      </div>

      <p class="text-center text-sm text-blue-200/40 mt-6">
        <a href="index.html" class="hover:text-white/40 transition"
          >← Back to home</a
        >
      </p>
    </div>

    <script>
      function togglePwd(id, iconId) {
        const inp = document.getElementById(id),
          icon = document.getElementById(iconId);
        inp.type = inp.type === "password" ? "text" : "password";
        icon.classList.toggle("fa-eye");
        icon.classList.toggle("fa-eye-slash");
      }

      async function handleSetPassword(e) {
        e.preventDefault();
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirmPwd").value;
        const errEl = document.getElementById("error");
        errEl.classList.add("hidden");

        if (password !== confirm) {
          errEl.textContent = "Passwords do not match.";
          errEl.classList.remove("hidden");
          return;
        }

        const btn = document.getElementById("setPasswordBtn");
        setLoading(btn, true);

        try {
          await updatePassword(password);

          // Mark password as set
          const user = getUser();
          await dbUpdate(
            "affiliates",
            { email: user.email },
            { password_set: true },
          );

          window.location.href = "affiliate/dashboard.html";
        } catch (err) {
          errEl.textContent = err.message || "Failed to set password.";
          errEl.classList.remove("hidden");
          setLoading(btn, false, "Set Password");
        }
      }

      // Check if user is logged in and is affiliate
      (async () => {
        const session = getSession();
        if (!session?.access_token) {
          window.location.href = "login.html";
          return;
        }

        const affiliate = await isAffiliate();
        if (!affiliate) {
          window.location.href = "dashboard.html";
          return;
        }

        // Check if password is already set
        try {
          const affiliates = await dbSelect(
            "affiliates",
            `?email=eq.${session.user.email}&select=password_set`,
          );
          if (
            affiliates &&
            affiliates.length > 0 &&
            affiliates[0].password_set
          ) {
            window.location.href = "affiliate/dashboard.html";
          }
        } catch (e) {
          console.error("Failed to check password status:", e);
        }
      })();
    </script>
  </body>
</html>
