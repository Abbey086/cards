<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password – Amanda Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script src="js/supabase.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["DM Sans", "sans-serif"],
              display: ["Sora", "sans-serif"],
            },
            colors: {
              navy: { DEFAULT: "#1B2B4B", light: "#243560" },
              gold: { DEFAULT: "#C9A84C", light: "#E8C96D" },
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "DM Sans", sans-serif;
      }
      .font-display {
        font-family: "Sora", sans-serif;
      }
      .gold-gradient {
        background: linear-gradient(135deg, #c9a84c, #e8c96d);
      }
      .auth-bg {
        background: linear-gradient(135deg, #1b2b4b 0%, #243560 100%);
      }
      .glass-input {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #fff;
        transition: all 0.2s;
        width: 100%;
        padding: 11px 14px;
        border-radius: 12px;
        font-size: 14px;
        font-family: "DM Sans", sans-serif;
        outline: none;
      }
      .glass-input:focus {
        border-color: rgba(201, 168, 76, 0.5);
        background: rgba(255, 255, 255, 0.08);
      }
      .glass-input::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.08);
      }
      input:-webkit-autofill {
        -webkit-box-shadow: 0 0 0 30px #1e3561 inset !important;
        -webkit-text-fill-color: #fff !important;
      }
    </style>
  </head>
  <body
    class="auth-bg min-h-screen flex items-center justify-center px-4 py-12"
  >
    <div class="w-full max-w-sm">
      <div class="text-center mb-8">
        <a href="index.html" class="inline-flex items-center gap-2 mb-6">
          <div
            class="w-9 h-9 gold-gradient rounded-xl flex items-center justify-center"
          >
            <i class="fas fa-id-card text-white text-sm"></i>
          </div>
          <span class="font-display font-bold text-xl text-white"
            >Amanda<span class="text-gold">Cards</span></span
          >
        </a>
        <h1 class="font-display text-2xl font-bold text-white mb-1">
          Set new password
        </h1>
        <p class="text-blue-200/50 text-sm">Enter your new password below</p>
      </div>

      <div
        class="bg-white/5 border border-white/10 rounded-3xl p-7 backdrop-blur-sm"
      >
        <form
          id="resetForm"
          onsubmit="handlePasswordReset(event)"
          class="space-y-4"
        >
          <div>
            <label class="block text-xs text-blue-200/60 font-medium mb-1.5"
              >New password</label
            >
            <div class="relative">
              <input
                type="password"
                id="password"
                placeholder="••••••••"
                class="glass-input pr-10"
                required
                minlength="6"
              />
              <button
                type="button"
                onclick="togglePwd('password', 'eye1')"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 transition"
              >
                <i id="eye1" class="fas fa-eye text-xs"></i>
              </button>
            </div>
          </div>
          <div>
            <label class="block text-xs text-blue-200/60 font-medium mb-1.5"
              >Confirm new password</label
            >
            <div class="relative">
              <input
                type="password"
                id="confirmPassword"
                placeholder="••••••••"
                class="glass-input pr-10"
                required
                minlength="6"
              />
              <button
                type="button"
                onclick="togglePwd('confirmPassword', 'eye2')"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 transition"
              >
                <i id="eye2" class="fas fa-eye text-xs"></i>
              </button>
            </div>
          </div>
          <div
            id="resetError"
            class="hidden text-xs text-red-400 bg-red-400/10 border border-red-400/20 rounded-lg px-3 py-2"
          ></div>
          <button
            type="submit"
            id="resetBtn"
            class="w-full gold-gradient text-navy font-bold py-3.5 rounded-xl text-sm hover:opacity-90 transition mt-1"
          >
            Update Password
          </button>
        </form>
      </div>

      <p class="text-center text-sm text-blue-200/40 mt-6">
        Remember your password?
        <a
          href="login.html"
          class="text-gold hover:text-gold-light transition font-medium"
          >Sign in</a
        >
      </p>
    </div>

    <script>
      // Handle password reset redirect
      (async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const accessToken = urlParams.get("access_token");
        const refreshToken = urlParams.get("refresh_token");
        const type = urlParams.get("type");

        if (accessToken && refreshToken && type === "recovery") {
          // Save the session from URL params
          const session = {
            access_token: accessToken,
            refresh_token: refreshToken,
            expires_at: Math.floor(Date.now() / 1000) + 3600, // Assume 1 hour
            user: null, // Will be fetched if needed
          };
          saveSession(session);
          // Clean up URL
          window.history.replaceState(
            {},
            document.title,
            window.location.pathname,
          );
        }
      })();

      function togglePwd(id, iconId) {
        const inp = document.getElementById(id),
          icon = document.getElementById(iconId);
        inp.type = inp.type === "password" ? "text" : "password";
        icon.classList.toggle("fa-eye");
        icon.classList.toggle("fa-eye-slash");
      }

      function showError(msg) {
        const el = document.getElementById("resetError");
        el.textContent = msg;
        el.classList.remove("hidden");
        el.style.color = "#ef4444";
        el.style.background = "rgba(239,68,68,0.1)";
        el.style.borderColor = "rgba(239,68,68,0.2)";
      }

      function showSuccess(msg) {
        const el = document.getElementById("resetError");
        el.textContent = msg;
        el.classList.remove("hidden");
        el.style.color = "#86efac";
        el.style.background = "rgba(134,239,172,0.1)";
        el.style.borderColor = "rgba(134,239,172,0.2)";
      }

      async function handlePasswordReset(e) {
        e.preventDefault();
        const btn = document.getElementById("resetBtn");
        const password = document.getElementById("password").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;
        const errEl = document.getElementById("resetError");
        errEl.classList.add("hidden");

        if (password !== confirmPassword) {
          showError("Passwords do not match.");
          return;
        }

        if (password.length < 6) {
          showError("Password must be at least 6 characters.");
          return;
        }

        setLoading(btn, true);
        try {
          await updatePassword(password);
          showSuccess("Password updated successfully! Redirecting...");
          setTimeout(() => {
            window.location.href = "login.html";
          }, 2000);
        } catch (err) {
          showError(
            err.message || "Failed to update password. Please try again.",
          );
          setLoading(btn, false, "Update Password");
        }
      }
    </script>
  </body>
</html>
